<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egern Widget Preview</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif; background:#1a1a2e; color:#eee; height:100vh; display:flex; }
#sidebar { width:380px; min-width:380px; background:#16213e; display:flex; flex-direction:column; border-right:1px solid #0f3460; }
#sidebar h2 { padding:14px 16px; font-size:14px; color:#e94560; border-bottom:1px solid #0f3460; }
#sidebar .toolbar { padding:8px 12px; display:flex; gap:8px; border-bottom:1px solid #0f3460; }
#sidebar .toolbar button { padding:6px 14px; border:none; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; background:#0f3460; color:#eee; }
#sidebar .toolbar button.active { background:#e94560; }
#sidebar textarea { flex:1; background:#0a1628; color:#a8d8ea; border:none; padding:12px; font-family:'SF Mono','Monaco','Consolas',monospace; font-size:11px; resize:none; outline:none; }
#preview { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; overflow:auto; }
#preview.dark { background:#121212; }
#preview.light { background:#f5f5f7; }
.widget { display:flex; flex-direction:column; border-radius:20px; overflow:hidden; min-width:320px; max-width:440px; width:100%; }
.widget.light { background:#fff; box-shadow:0 2px 20px rgba(0,0,0,0.08); }
.widget.dark { background:#1c1c1e; box-shadow:0 2px 20px rgba(0,0,0,0.4); }
.row { display:flex; flex-direction:row; }
.col { display:flex; flex-direction:column; }
.spacer { flex:1; }
.text { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; line-height:1.25; }
.icon { display:inline-flex; align-items:center; justify-content:center; font-size:inherit; }
.bg-gradient { width:100%; height:100%; }
.error { color:#ff453a; padding:20px; text-align:center; font-size:14px; }
@media (max-width:768px) { body { flex-direction:column; } #sidebar { width:100%; min-width:0; height:40%; } }
</style>
</head>
<body>

<div id="sidebar">
  <h2>📋 Widget JSON</h2>
  <div class="toolbar">
    <button id="btnRun" style="background:#e94560">▶ 渲染</button>
    <button id="btnLoad">📂 加载</button>
    <button id="btnSample">📄 示例</button>
    <select id="selMode" style="background:#0f3460;color:#eee;border:none;border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer">
      <option value="light">浅色</option>
      <option value="dark">深色</option>
    </select>
  </div>
  <textarea id="input" placeholder="粘贴 Egern Widget JSON 或点击「加载」选择本地文件..."></textarea>
</div>
<div id="preview" class="dark">
  <div style="text-align:center;color:#666;font-size:14px">
    <div style="font-size:40px;margin-bottom:12px">📱</div>
    粘贴 JSON 后点击「渲染」查看效果
  </div>
</div>

<script>
// ── SF Symbol → emoji 映射 ──────────────────────────────────────────
const iconMap = {
  'waveform.path.ecg':'📡','wifi':'📶','antenna.radiowaves.left.and.right':'📡',
  'house.fill':'🏠','location.circle.fill':'📍','location.fill':'📍',
  'mappin.and.ellipse':'📍','map.fill':'🗺️','globe':'🌐',
  'globe.asia.australia.fill':'🌏','globe.americas.fill':'🌎',
  'network':'🌐','server.rack':'🖥️','building.2.fill':'🏢',
  'building.columns.fill':'🏛️','shield.lefthalf.filled':'🛡️',
  'checkmark.shield.fill':'✅','xmark.shield.fill':'❌',
  'exclamationmark.shield.fill':'⚠️','questionmark.shield.fill':'❓',
  'circle.hexagongrid.fill':'⬡','circle.hexagongrid':'⬡',
  'point.3.connected.trianglepath.dotted':'🔗',
  'paperplane.fill':'📨','paperplane':'📨',
  'play.rectangle.fill':'▶️','play.tv.fill':'📺',
  'music.note':'🎵','dot.radiowaves.left.and.right':'📻',
  'magnifyingglass':'🔍','sparkles':'✨','xmark':'✖️',
  'scope':'🎯','slider.horizontal.3':'🎚️',
  'clock':'🕐','timer':'⏱️','arrow.clockwise':'🔄',
  'arrow.up.and.down.circle.fill':'⏫',
  'router.fill':'📡','simcard.fill':'📱',
  'cloud.fill':'☁️','moon.stars.fill':'🌙',
  'gift.fill':'🎁','hourglass.circle.fill':'⏳',
  'cpu':'💻','iphone':'📱','wifi.slash':'❌',
};

function iconEmoji(name) {
  if (iconMap[name]) return iconMap[name];
  const short = name.replace(/\.fill$/,'').split('.').pop();
  if (iconMap[short]) return iconMap[short];
  return short.length <= 4 ? short : '●';
}

// ── 颜色解析 ────────────────────────────────────────────────────────
function resolveColor(c, mode) {
  if (!c) return '#888';
  if (typeof c === 'string') return c;
  if (c.light && c.dark) return mode === 'dark' ? c.dark : c.light;
  return c.light || c.dark || '#888';
}

function parseRGBA(c) {
  if (!c || c === 'transparent' || c === '#00000000') return 'transparent';
  return c;
}

// ── 渲染核心 ────────────────────────────────────────────────────────
function renderNode(node, mode) {
  if (!node) return '';
  if (typeof node === 'string') return escapeHtml(node);

  const t = node.type;
  const style = [];
  const bg = resolveColor(node.backgroundColor, mode);

  if (bg && bg !== 'transparent') style.push(`background:${bg}`);
  if (node.padding) {
    const p = Array.isArray(node.padding) ? node.padding.map(v=>Math.round(v)+'px').join(' ') : Math.round(node.padding)+'px';
    style.push(`padding:${p}`);
  }
  if (node.borderRadius) style.push(`border-radius:${Math.round(node.borderRadius)}px`);
  if (node.borderWidth && node.borderColor) {
    style.push(`border:${Math.round(node.borderWidth)}px solid ${resolveColor(node.borderColor,mode)}`);
  }
  if (node.width) style.push(`width:${Math.round(node.width)}px`);
  if (node.height) style.push(`height:${Math.round(node.height)}px`);
  if (node.flex) style.push(`flex:${node.flex}`);
  if (node.minScale) style.push(`--min-scale:${node.minScale}`);

  // background gradient
  let gradBg = '';
  if (node.backgroundGradient && node.backgroundGradient.type === 'linear') {
    const cols = (node.backgroundGradient.colors||[]).map(c=>resolveColor(c,mode));
    const sx = node.backgroundGradient.startPoint || {x:0,y:0};
    const ex = node.backgroundGradient.endPoint || {x:1,y:1};
    const deg = Math.atan2(ex.y-sx.y, ex.x-sx.x) * 180 / Math.PI;
    gradBg = `background:linear-gradient(${Math.round(deg+90)}deg,${cols.join(',')})`;
  }

  if (t === 'widget') {
    const s = style.join(';');
    const children = (node.children||[]).map(c=>renderNode(c,mode)).join('');
    return `<div class="widget ${mode}" style="${s}${gradBg?';'+gradBg.slice(13):''}">${children}</div>`;
  }

  if (t === 'stack') {
    const dir = node.direction === 'row' ? 'row' : 'col';
    const align = node.alignItems === 'start' ? 'flex-start' : node.alignItems === 'end' ? 'flex-end' : node.alignItems || 'center';
    const gap = node.gap ? `gap:${Math.round(node.gap)}px` : '';
    const justify = node.justifyContent || '';
    const wrap = node.flexWrap || '';
    const s = style.join(';');
    const children = (node.children||[]).map(c=>renderNode(c,mode)).join('');
    return `<div class="${dir}" style="${s};align-items:${align};${gap};${justify};${wrap};${gradBg?';'+gradBg.slice(13):''}">${children}</div>`;
  }

  if (t === 'text') {
    const fs = node.font?.size || 12;
    const fw = node.font?.weight || 'regular';
    const w = {regular:400,medium:500,semibold:600,bold:700,heavy:800}[fw] || 400;
    const c = resolveColor(node.textColor, mode);
    const align = node.textAlign || 'left';
    const ml = node.maxLines || 1;
    const scale = node.minScale ? `min-scale:${node.minScale}` : '';
    const wrap = ml > 1 ? '' : 'white-space:nowrap';
    const s = style.join(';');
    return `<span class="text" style="${s};font-size:${fs}px;font-weight:${w};color:${c};text-align:${align};${wrap};overflow:hidden;text-overflow:ellipsis;flex-shrink:1">${escapeHtml(String(node.text??''))}</span>`;
  }

  if (t === 'image') {
    const size = Math.round(node.width||node.height||13);
    const c = resolveColor(node.color, mode);
    const emoji = node.src?.startsWith('sf-symbol:') ? iconEmoji(node.src.slice(10)) : '●';
    const s = style.join(';');
    return `<span class="icon" style="${s};font-size:${Math.round(size*0.85)}px;color:${c};width:${size}px;height:${size}px;flex-shrink:0">${emoji}</span>`;
  }

  if (t === 'spacer') {
    return `<div class="spacer" style="${style.join(';')}"></div>`;
  }

  return '';
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 主渲染 ──────────────────────────────────────────────────────────
function render() {
  const mode = document.getElementById('selMode').value;
  const preview = document.getElementById('preview');
  preview.className = mode;
  try {
    const json = JSON.parse(document.getElementById('input').value);
    const html = renderNode(json, mode);
    preview.innerHTML = html;
  } catch(e) {
    preview.innerHTML = `<div class="error">❌ JSON 解析失败: ${e.message}</div>`;
  }
}

// ── 事件绑定 ────────────────────────────────────────────────────────
document.getElementById('btnRun').addEventListener('click', render);
document.getElementById('selMode').addEventListener('change', render);

document.getElementById('btnSample').addEventListener('click', ()=>{
  document.getElementById('input').value = JSON.stringify({
    type:'widget',padding:16,backgroundColor:{light:'#fff',dark:'#1c1c1e'},
    children:[
      {type:'stack',direction:'row',alignItems:'center',gap:8,children:[
        {type:'image',src:'sf-symbol:wifi',color:{light:'#007aff',dark:'#0a84ff'},width:20,height:20},
        {type:'text',text:'WiFi 已连接',font:{size:16,weight:'bold'},textColor:{light:'#1c1c1e',dark:'#fff'}},
        {type:'spacer'},
        {type:'text',text:'21:30',font:{size:13,weight:'medium'},textColor:{light:'#8e8e93',dark:'#8e8e93'}}
      ]},
      {type:'spacer',length:12},
      {type:'stack',direction:'column',gap:6,children:[
        {type:'stack',direction:'row',gap:6,children:[
          {type:'text',text:'IP:',font:{size:12,weight:'medium'},textColor:{light:'#8e8e93',dark:'#8e8e93'}},
          {type:'text',text:'192.168.1.100',font:{size:12,weight:'semibold'},textColor:{light:'#1c1c1e',dark:'#fff'}}
        ]},
        {type:'stack',direction:'row',gap:6,children:[
          {type:'text',text:'延迟:',font:{size:12,weight:'medium'},textColor:{light:'#8e8e93',dark:'#8e8e93'}},
          {type:'text',text:'25ms',font:{size:12,weight:'bold'},textColor:{light:'#34c759',dark:'#30d158'}}
        ]}
      ]}
    ]
  },null,2);
  render();
});

document.getElementById('btnLoad').addEventListener('click',()=>{
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => { document.getElementById('input').value = r.result; render(); };
    r.readAsText(f);
  };
  inp.click();
});

document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key === 'Enter') render();
});
</script>

</body>
</html>
